name: Build

on:
  push:

defaults:
  run:
    shell: bash --noprofile --norc -e -u -x -o pipefail {0}

jobs:

  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        image: [ apply-job, bake-job, clone-job, controller, webhooks ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/arikkfir/devbot/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=sha,format=short,prefix=
      - uses: docker/build-push-action@v5
        with:
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: |
            APPLY_JOB=ghcr.io/arikkfir/devbot/apply-job:${{ github.sha }}
            BAKE_JOB=ghcr.io/arikkfir/devbot/bake-job:${{ github.sha }}
            CLONE_JOB=ghcr.io/arikkfir/devbot/clone-job:${{ github.sha }}
            BUILD=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: build/Dockerfile.${{ matrix.image }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-helm-chart:
    runs-on: ubuntu-latest
    env:
      VERSION: 0.0.0+${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2
      - run: echo -n ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
      - run: yq -i ".controller.image.tag=\"${TAG}\" | .webhooks.image.tag=\"${TAG}\"" deploy/chart/values.yaml
        env:
          TAG: ${{ github.sha }}
      - run: helm lint deploy/chart/
      - run: helm package --version ${VERSION} --app-version ${VERSION} deploy/chart/ --destination ./
      - run: helm push devbot-${VERSION}.tgz oci://ghcr.io/${GITHUB_ACTOR}
